#events
 MON.1.t:0 "Our weakened neighbour"
 MON.1.desc:0 "After helping them in their civil war we could definitely leverage their weakened position and our kind assistance to obtain a reward from our neighbour to the west. We could let them be, tie them to us in a military alliance or even have them pay us with a tax. But then there are some minority voices in our country pushing for unification... If we whip up the same movement in their lands, we could form a union that could dominate the region.."
 MON.1.a:0 "Offer unification"
 MON.1.b:0 "Tax them"
 MON.1.c:0 "Work with them"
 MON.1.d:0 "You're welcome"
 MON.2.t:0 "The death of Gelegdorjiin Demid"
 MON.2.d:0 "Gelegdorjiin Demid is the very popular commander-in-chief of our armed forces. While on board of a train on the Trans-Siberian railway to our friends in Moscow, he seems to have died. The situation looks very suspicious, what should we tell the Soviets?"
 MON.2.a:0 "We poisoned him"
 MON.2.b:0 "Food poisoning can get us all"
 MON.3.t:0 "Anti-Stalinism and the News"
 MON.3.d:0 "The dead of Demid has cleared the way for Khorloogiin Choibalsan to accede to the dual role of sole commander-in-chief of the military and minister of war as well as the position of the minister of interior. He has issued order 366 which has declared that many in Mongolia “have fallen under the influence of Japanese spies and provocateurs". And so the purge begins. As a staunch ally of Stalin, he will want to get rid of those that badmouth his policies and assure our control over the news."
 MON.3.a:0 "Purge all of them"
 MON.3.b:0 "Assure full control the news"
 MON.3.c:0 "Rid us of the Anti-Stalinists"
 MON.4.t:0 "Leftist Deviant Leaders"
 MON.4.d:0 "The leftist deviation was a period of overly aggressive persecution of the Buddhist Church, rapid collectivization and land expropriation. We aren't against such things, but they led to popular uprisings in our country. Turning the people against her goverment is the worst crime of all. The perpetrators of this leftist deviation will need to be punished for this."
 MON.4.a:0 "Purge the leadership of them"
 MON.4.b:0 "Persecute the Badrakh Group seperatists"
 MON.4.c:0 "We stand behind these actions"
 MON.5.t:0 "Monarchism and Religion"
 MON.5.d:0 "Our country is full of monastaries filled with clergy. These medieval beliefs do not fit a modern communist state as we oppose any God or form of religion. This abolition of Mongolian Buddhism will be violent and swift. There's also the wife of the last king who we have granted the mercy to live on after our revolution and swathes of followers of the old regime that we can not allow to simmer into a counter-revolution."
 MON.5.a:0 "Slaughter them all"
 MON.5.b:0 "Purge the clergy"
 MON.5.c:0 "Preserve traditional culture"
 MON.6.t:0 "Buryats"
 MON.6.d:0 "In 1917 the Buryat-Mongols created their own independent state and there are other examples of them lobbying for autonomous regions and other acts of nationalist seperatism. We cannot allow this in a centralised goverment where we claim to represent all Mongolians, Mongol or not. We will need to crack down on this ethnic group and it's prominent leaders to keep this movement contained. We will claim they are 'followers of Pro-Japanese idealogy' and rid ourselves of them."
 MON.6.a:0 "Repress the Buryats"
 MON.6.b:0 "Save Batkhaan"
 MON.6.c:0 "Pan-Mongolism is the future"
 MON.7.t:0 "Struggle for Leadership"
 MON.7.d:0 "With the Great Repression coming even for former prime minister Peljidiin Genden, it is clear nobody is safe from Khorloogiin Choibalsan and his NKVD cronies. Currently there is a coordinated propaganda campaign going to try and remove our current prime minister Anandyn Amar. If even Darizavyn Losol and Dansrabilegyin Dogsam are purged, Choibalsan would be the last living member of the seven founding members of the MPRP and an inevitable choice as leader.."
 MON.7.a:0 "Secure the way for Choibalsan"
 MON.7.b:0 "Save Anandyn Amar"
 MON.7.c:0 "Guarantee safety for party leadership"
 MON.8.t:0 "Blame for purge excesses"
 MON.8.d:0 "With the leadership secured in it's position it has declared that the excesses of the purges had been conducted by overzealous party officials. Nonetheless the arrests of the real criminals has been overseen by them personally. Now it is time for us to let the official blame fall upon someone to arrest and execute. Sending them to a Soviet prison or one of our new Mongolian gulags will tie off any loose ends neatly."
 MON.8.a:0 "These henchmen will rightly be punished"
 MON.8.b:0 "It was the Soviets all along"
 MON.8.c:0 "The goverment stands behind it's officials"
 MON_savethem_tt:0 "You will protect this group from the Purge and invoke the ire of the USSR"
 MON.9.t:0 "Unify with Mongolia?"
 MON.9.d:0 "With our civil war ended with Mongolian help, some of our minorities are clamering to unite with the nation of [MON.GetLeader]. We are currently weakened and they could take us by force if we were to refuse. Unify or not, that is the question..."
 MON.9.a:0 "Of course we will!"
 MON.9.b:0 "No! It's preposterous!"
 MON.10.t:0 "Paying the Mongols"
 MON.10.d:0 "Well the help we got from [MON.GetLeader]'s troops don't seem to have come from the goodness of their hearts, they are demanding a payment of some sort for services rendered. What will we do? Refusing to pay up might anger them.."
 MON.10.a:0 "We will levy a tax"
 MON.10.b:0 "Tax our resources"
 MON.10.c:0 "Absolutely not!"
 MON.11.t:0 "Standing united with Mongolia?"
 MON.11.d:0 "The Mongol forces and ours working in unison on the battlefield was a sight to behold. [MON.GetLeader] has proposed a military alliance that would keep us safe from outside attack and we would help each other out. This could be a solid political move for us, even if this would move us further away from the other factions in Asia."
 MON.11.a:0 "We will be unstoppable!"
 MON.11.b:0 "We're good.."
 MON.12.t:0 "You're welcome!"
 MON.12.d:0 "The Mongol goverment under [MON.GetLeader] has informed us that what they did was done as a sign of good will with our nation and they don't require any compensation. We didn't see this coming!"
 MON.12.a:0 "Such nice folks!"
 MON.13.t:0 "[SIK.GetLeader] refuses"
 MON.13.d:0 "Our western neighbour has chosen unwisely. We will make sure that they know this fact, even if they won't survive to regret it."
 MON.13.a:0 "By force it is.."
 MON.14.t:0 "[SIK.GetLeader] the Union"
 MON.14.d:0 "The leader of our western neighbour has accepted for us to unite in an Altaic union of sorts! Militarily, politically and economically we have become one strong nation, stronger together. We will be able to push on and become a force to be reckoned with."
 MON.14.a:0 "The best outcome"
 MON.15.t:0 "[SIK.GetLeader] accepts"
 MON.15.d:0 "Their leader has acceded to our demands and we've recieve what we required from them. We might have lost some men to help them out, but we have been properly compensated for their heroics."
 MON.15.a:0 "Good"
 mon_trade_deal.1.t:0 "Importing Mongolian produce?"
 mon_trade_deal.1.desc:0 "Our country has had a diplomat from Mongolia reach out on behalf of [MON.GetLeader] to offer us favorable terms for the importing of wheat, barley, oats and more. This would greatly help our nation's troops suffer less from attrition and supply problems due to better rations."
 mon_trade_deal.1.a:0 "We accept"
 mon_trade_deal.1.b:0 "No thanks"
 mon_trade_deal.2.t:0 "They accept our offer"
