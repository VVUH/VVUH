 MON_soviet_supervision_desc:0 "There's Soviet pressure for us to comform to Stalinism and the directions being given from Moscow. We can't step out of line, not now. Not yet."
 MON_soviet_ties:0 "USSR Ties"
 MON_soviet_ties_desc:0 "We have a lot to thank the USSR for and we have close ties with them. There's pros and cons to this relationship and if we were to revisit these treaties we would lose the benefits as well as the problems that come with it."
